name: ci-gui

on:
  push:
    branches: [main, develop]
    paths:
      - 'hp41-gui/**'
      - 'hp41-core/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'hp41-gui/**'
      - 'hp41-core/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: GUI Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: hp41-gui/src-tauri -> hp41-gui/src-tauri/target

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver xvfb

      - name: GUI CI
        run: just gui-ci

  # Phase 27 Plan 04 / FN-QUAL-05 — WebdriverIO + tauri-driver E2E smoke
  # (D-27.15 AMENDED 2026-05-15: WebdriverIO replaces Playwright since
  # tauri-driver 2.0.6 speaks WebDriver classic which Playwright does NOT).
  # Ubuntu-only per ROADMAP cross-cutting constraint. Required for merge
  # (configured in repo branch-protection settings — manual follow-up).
  e2e-linux:
    name: GUI E2E (Ubuntu only — WebdriverIO + tauri-driver)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: hp41-gui/src-tauri -> hp41-gui/src-tauri/target

      - name: Cache cargo bin (tauri-driver — Pitfall 5)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-tauri-driver-2.0.6

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install Linux system deps (Pitfall 6 — webkit2gtk-driver)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf webkit2gtk-driver xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked --version 2.0.6

      - name: Build release binary
        run: just gui-build

      - name: Run E2E smoke under Xvfb (Assumption A5)
        run: xvfb-run -a just gui-e2e
        env:
          CI: true
