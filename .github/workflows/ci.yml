name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just fmt-check
      - run: just lint

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # macOS-latest runners intermittently leave `cargo` proxying to rustup-init
      # after the toolchain action + cache restore, producing `error: unexpected
      # argument 'build' found / Usage: rustup-init[EXE]` on the first cargo
      # invocation (observed 4× during Phase 27 CI). Swatinem/rust-cache restores
      # `~/.cargo/bin/` contents which can clobber rustup's proxy config; running
      # `rustup default stable` AFTER the cache restore rebinds the cargo proxy
      # to the installed stable toolchain. No-op on Linux/Windows.
      - run: rustup default stable
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Build release binary
        run: just build-release
      - name: Run tests
        run: just test

  coverage:
    name: Coverage (>=95%)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-llvm-cov
      - run: just coverage

  msrv:
    name: MSRV (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      # `just ci-msrv` = lint + test (NO coverage). Coverage is rustc-version-dependent:
      # MSRV 1.88 instruments llvm-cov differently than stable and reports ~94.4%
      # vs stable's ~95.3% on identical source. Enforcing the post-Phase-27 95%
      # gate on MSRV would create an artificial test-padding arms race tied to the
      # lowest measurement-tool baseline. The dedicated coverage job above runs
      # on stable and enforces the gate; this job verifies the MSRV still builds
      # and tests still pass.
      - run: just ci-msrv

  # Phase 32 Plan 32-03 / D-32.7 + D-32.8. Free42 GPL-contamination guard.
  # Runs in parallel with lint / test / coverage / msrv (no needs:) so the
  # license audit is independently visible in the GitHub PR checks panel.
  # The same script also runs as a step inside `just ci` for fast local-dev
  # feedback (D-32.8 belt + suspenders rationale).
  # No untrusted input is used in any run: step (the script is checked in;
  # the just CLI is fetched from a pinned taiki-e action). Workflow-injection
  # surface is therefore zero.
  license-audit:
    name: License audit (Free42 contamination)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just license-audit
